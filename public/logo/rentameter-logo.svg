<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Outer circle (gauge body) -->
  <circle cx="24" cy="24" r="22" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="2.5"/>
  <!-- Gauge arc -->
  <path d="M 12 36 A 16 16 0 1 1 36 36" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="24" y1="6" x2="24" y2="10" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="20" x2="14" y2="20" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="20" x2="38" y2="20" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.5" y1="12" x2="16.3" y2="14.8" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34.5" y1="12" x2="31.7" y2="14.8" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Needle pointing upper-right (indicating high/optimal) -->
  <line x1="24" y1="24" x2="33" y2="13" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="3" fill="url(#grad1)"/>
  <!-- Small inner circle -->
  <circle cx="24" cy="24" r="1.5" fill="white"/>
</svg>
